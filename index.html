<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Shopper Service</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        header { text-align: center; padding: 40px; background: #25D366; color: white; border-radius: 10px; }
        .catalog { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 30px; }
        .product-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        .product-card img { max-width: 100%; height: 200px; object-fit: cover; border-radius: 5px; }
        .price { font-size: 1.2em; color: #2c3e50; font-weight: bold; margin: 10px 0; }
        .ref { color: #7f8c8d; font-size: 0.8em; margin-bottom: 15px; }
        .whatsapp-btn { 
            display: inline-block; background-color: #25D366; color: white; 
            padding: 10px 20px; text-decoration: none; border-radius: 5px; font-weight: bold; 
        }
        .whatsapp-btn:hover { background-color: #128C7E; }
    </style>
</head>
<body>

<header>
    <h1>Global Shopping Assistant</h1>
    <p>Find what you want. We buy and ship it for you!</p>
</header>

<div class="catalog">
    <div class="product-card">
        <img src="https://ae-pic-a1.aliexpress-media.com/kf/S8464cc28be034d8794c69fe18c5110baC.jpg?has_lang=1&ver=2_220x220q75.jpg_.avif" alt="Product Name">
        <h3>Premium Smartwatch</h3>
        <p class="price">$45.00</p>
        <p class="ref">Ref: WATCH-01</p>
        <a href="https://wa.me/213662825152?text=Hello!%20I%20want%20to%20order%20Ref:%20WATCH-01" class="whatsapp-btn">Order via WhatsApp</a>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/200" alt="Product Name">
        <h3>Wireless Headphones</h3>
        <p class="price">$30.00</p>
        <p class="ref">Ref: HEAD-02</p>
        <a href="https://wa.me/213662825152?text=Hello!%20I%20want%20to%20order%20Ref:%20WATCH-01" class="whatsapp-btn">Order via WhatsApp</a>
    </div>
</div>

<footer>
    <p style="text-align: center; margin-top: 50px; color: #95a5a6;">Send us the reference number to get a final quote with commission.</p>
</footer>

</body>
</html>
